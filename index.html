<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Runway — Budget Planner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛫</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 32 20" width="26" height="16" fill="currentColor" style="transform:rotate(-18deg)" aria-hidden="true"><path d="M14 4 L28 10 L14 16 L18 10 Z"/></svg></div>
        <div class="brand-text">
          <span class="brand-name">Runway</span>
          <span class="brand-tag">know what's left</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">
          <span class="nav-ico"><svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="2.5" width="6.5" height="6.5" rx="1.5"/><rect x="11" y="2.5" width="6.5" height="6.5" rx="1.5"/><rect x="2.5" y="11" width="6.5" height="6.5" rx="1.5"/><rect x="11" y="11" width="6.5" height="6.5" rx="1.5"/></svg></span><span>Dashboard</span>
        </button>
        <button class="nav-btn" data-view="transactions">
          <span class="nav-ico"><svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 3v13"/><path d="M3 7l3-3 3 3"/><path d="M14 17V4"/><path d="M17 13l-3 3-3-3"/></svg></span><span>Transactions</span>
        </button>
        <button class="nav-btn" data-view="bills">
          <span class="nav-ico"><svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><path d="M6.5 10.2l2.3 2.3 4.7-5"/></svg></span><span>Bills</span>
        </button>
        <button class="nav-btn" data-view="goals">
          <span class="nav-ico"><svg viewBox="0 0 20 20" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><circle cx="10" cy="10" r="4.3"/><circle cx="10" cy="10" r="1.1" fill="currentColor" stroke="none"/></svg></span><span>Goals</span>
        </button>
      </nav>

      <div id="storage-warning" class="storage-warning" hidden>
        ⚠️ This browser won't save your data. Back up to a file after every session.
      </div>

      <div class="sidebar-foot">
        <button id="sync-account" class="ghost-btn" title="Sync your data across devices">
          <span id="sync-dot" class="sync-dot off"></span><span id="sync-label">Sync</span>
        </button>
        <button id="theme-toggle" class="ghost-btn" title="Toggle theme">
          <span class="theme-ico">◐</span><span class="theme-label">Theme</span>
        </button>
        <button id="backup-file" class="ghost-btn" title="Download all your data as a backup file">⬇ Backup to file</button>
        <button id="restore-file" class="ghost-btn" title="Restore data from a backup file">⬆ Restore from file</button>
        <input type="file" id="restore-input" accept="application/json" hidden>
        <button id="start-fresh" class="ghost-btn subtle" title="Clear everything and start at zero">Start fresh</button>
        <button id="reset-demo" class="ghost-btn subtle" title="Restore the sample April data">Reset sample data</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="month-switch">
          <button id="month-prev" class="icon-btn" aria-label="Previous month">‹</button>
          <button id="month-label" class="month-label" title="Jump to current month"></button>
          <button id="month-next" class="icon-btn" aria-label="Next month">›</button>
        </div>
        <div class="topbar-right">
          <div class="mini-left" id="mini-left" title="Left to spend this month"></div>
          <button id="import-entries" class="ghost-btn" title="Bulk-import transactions">⇩ Import</button>
          <button id="add-entry" class="primary-btn">＋ Add entry</button>
        </div>
      </header>

      <div id="view" class="view"></div>
    </main>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
  <canvas id="confetti"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
